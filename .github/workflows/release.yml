name: Release Build

on:
  push:
    branches:
      - main

jobs:
  version:
    if: endsWith(github.event.head_commit.message, '--release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SUBMODULE_PAT }}
          submodules: recursive

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next semantic version
        id: bump
        run: |
          # Get the latest version tag (e.g. v1.0.9), default to v0.0.0
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — start at v1.0.0
            NEW_VERSION="1.0.0"
          else
            # Strip leading 'v'
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            if [ "$PATCH" -ge 9 ]; then
              # Bump minor, reset patch
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              # Bump patch
              PATCH=$((PATCH + 1))
            fi

            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "🏷️  Next version: v$NEW_VERSION"

      - name: Update version in package.json
        run: |
          jq --arg v "${{ steps.bump.outputs.new_version }}" \
            '.version = $v' package.json > package.tmp.json \
            && mv package.tmp.json package.json

      - name: Update version in tauri.conf.json
        run: |
          jq --arg v "${{ steps.bump.outputs.new_version }}" \
            '.version = $v' src-tauri/tauri.conf.json > tauri.tmp.json \
            && mv tauri.tmp.json src-tauri/tauri.conf.json

      - name: Update version in Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.bump.outputs.new_version }}\"/" src-tauri/Cargo.toml

      - name: Commit version bump & create tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }}"
          git tag "v${{ steps.bump.outputs.new_version }}"
          git config --local --unset-all "http.https://github.com/.extraheader" || true
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push origin main --tags

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            rust_target: aarch64-apple-darwin
            label: apple_silicon
            bundle_type: dmg
          - runner: macos-14
            rust_target: x86_64-apple-darwin
            label: intel_chip
            bundle_type: dmg
          - runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows_x64
            bundle_type: nsis

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}
          token: ${{ secrets.SUBMODULE_PAT }}
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust_target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache frontend dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        run: bun run tauri build --target ${{ matrix.rust_target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Find and rename macOS installer
        if: runner.os == 'macOS'
        id: macos_installer
        run: |
          DMG_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg"
          DMG_FILE=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -n1)

          if [ -z "$DMG_FILE" ]; then
            echo "::error::No .dmg found in $DMG_DIR"
            exit 1
          fi

          BASENAME=$(basename "$DMG_FILE" .dmg)
          FINAL_NAME="${BASENAME}-${{ matrix.label }}.dmg"
          mv "$DMG_FILE" "$DMG_DIR/$FINAL_NAME"

          echo "installer_path=$DMG_DIR/$FINAL_NAME" >> "$GITHUB_OUTPUT"

      - name: Find and rename Windows installer
        if: runner.os == 'Windows'
        id: windows_installer
        shell: bash
        run: |
          NSIS_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis"
          EXE_FILE=$(ls "$NSIS_DIR"/*.exe 2>/dev/null | head -n1)

          if [ -z "$EXE_FILE" ]; then
            echo "::error::No .exe found in $NSIS_DIR"
            exit 1
          fi

          BASENAME=$(basename "$EXE_FILE" .exe)
          FINAL_NAME="${BASENAME}-${{ matrix.label }}.exe"
          mv "$EXE_FILE" "$NSIS_DIR/$FINAL_NAME"

          echo "installer_path=$NSIS_DIR/$FINAL_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: cf-studio-${{ matrix.label }}
          path: ${{ steps.macos_installer.outputs.installer_path || steps.windows_installer.outputs.installer_path }}
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.version.outputs.new_version }}"
          name: "CF Studio v${{ needs.version.outputs.new_version }}"
          body: |
            ## CF Studio v${{ needs.version.outputs.new_version }}

            ### Downloads
            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | Apple Silicon (M1/M2/M3/M4) | `CF-Studio-*-apple_silicon.dmg` |
            | macOS | Intel | `CF-Studio-*-intel_chip.dmg` |
            | Windows | x64 | `CF-Studio-*-windows_x64.exe` |

            #### macOS Note
            *You may need to run this command in your terminal after first open if getting any issue.* 
            ```bash
            xattr -cr /Applications/CF\ Studio.app
            ```

            #### Windows Note
            *Windows SmartScreen may show a warning — click "More info" → "Run anyway" to proceed.*
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./artifacts/*