name: Release

on:
  push:
    branches:
      - main

jobs:
  prepare:
    if: "endsWith(github.event.head_commit.message, '--release')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.verify_version.outputs.new_version }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Release Version
        id: verify_version
        run: |
          set -o pipefail
          # Run verification and capture only the last line (the version)
          # We use a temporary file to keep the full output for debugging
          ./scripts/verify_release.sh > verification_output.log 2>&1
          EXIT_CODE=$?
          cat verification_output.log
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Version verification failed!"
            exit 1
          fi
          
          NEW_VERSION=$(tail -n 1 verification_output.log)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Extract release notes for the body
          BODY=$(jq -r '.[0] | "### Features\n" + (.features | map("- " + .) | join("\n")) + "\n\n### Fixes\n" + (.fixes | map("- " + .) | join("\n"))' changelogs/changelogs.json)
          
          # Use a multi-line output for the body
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Bump Version and Commit
        run: |
          NEW_VERSION=${{ steps.verify_version.outputs.new_version }}
          
          # Bump package.json
          jq ".version = \"$NEW_VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          
          # Bump src-tauri/tauri.conf.json
          jq ".version = \"$NEW_VERSION\"" src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json
          
          # Only commit if there are changes
          if ! git diff --cached --exit-code; then
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push
          else
            echo "Version already bumped, skipping commit."
          fi

  build:
    needs: prepare
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main # Pull the latest changes (including the version bump)

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: bun install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ needs.prepare.outputs.new_version }}
          releaseName: "v${{ needs.prepare.outputs.new_version }}"
          releaseBody: ${{ needs.prepare.outputs.release_body }}
          releaseDraft: false
          prerelease: false